<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Agent Chat</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .agent { background: #e9ecef; color: #333; }
        .interrupt-card { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .controls { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; margin-left: 10px; cursor: pointer; }
        .arg-input { display: block; margin: 5px 0; width: 100%; }
    </style>
</head>
<body>

<div id="chat-window"></div>

<div id="interrupt-container"></div>

<div class="controls">
    <input type="text" id="user-input" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const thread_id = "user_123"; // Logic to persist session
    const chatWindow = document.getElementById('chat-window');
    const interruptContainer = document.getElementById('interrupt-container');

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value;
        if (!text) return;

        appendMessage('user', text);
        input.value = '';

        const response = await fetch('http://localhost:8000/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: text, thread_id: thread_id })
        });
        handleResponse(await response.json());
    }

    function handleResponse(data) {
        interruptContainer.innerHTML = ''; // Clear previous interrupts

        if (data.status === "COMPLETED") {
            appendMessage('agent', data.message);
        } else if (data.status === "REQUIRES_ACTION") {
            renderInterrupt(data);
        }
    }

    function renderInterrupt(data) {
        const card = document.createElement('div');
        card.className = 'interrupt-card';
        card.innerHTML = `
            <strong>Action Required: ${data.tool_name}</strong>
            <div id="edit-fields">
                ${Object.entries(data.args).map(([key, val]) => `
                    <label>${key}:</label>
                    <input class="arg-input" data-key="${key}" value="${val}" id="input-${key}">
                `).join('')}
            </div>
            <div style="margin-top:10px">
                ${data.options.includes('approve') ? `<button onclick="submitDecision('approve')">Approve</button>` : ''}
                ${data.options.includes('edit') ? `<button onclick="submitDecision('edit', '${data.tool_name}')">Submit Edit</button>` : ''}
                ${data.options.includes('reject') ? `<button onclick="submitDecision('reject')" style="background:#ffcccc">Reject</button>` : ''}
            </div>
        `;
        interruptContainer.appendChild(card);
    }

    async function submitDecision(type, toolName) {
        let payload = { thread_id: thread_id, decision_type: type };
        
        if (type === 'edit') {
            const inputs = document.querySelectorAll('.arg-input');
            let newArgs = {};
            inputs.forEach(i => newArgs[i.dataset.key] = i.value);
            payload.edited_args = { name: toolName, args: newArgs };
        }

        const response = await fetch('http://localhost:8000/decide', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        handleResponse(await response.json());
    }

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>
</body>
</html>
