<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px 12px 0 0;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .thread-info {
            font-size: 12px;
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message-group {
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            gap: 10px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-radius: 8px 0 8px 8px;
        }

        .message.assistant .message-content {
            background: #e9ecef;
            color: #333;
            border-radius: 0 8px 8px 8px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        /* Interrupt Panel */
        .interrupt-panel {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-out;
        }

        .interrupt-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-weight: 600;
            color: #856404;
        }

        .interrupt-icon {
            font-size: 20px;
        }

        .action-card {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .action-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .action-description {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }

        .parameters {
            margin-bottom: 12px;
        }

        .parameter {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: flex-start;
        }

        .parameter-label {
            font-weight: 500;
            color: #555;
            min-width: 100px;
            padding-top: 8px;
        }

        .parameter-input {
            flex: 1;
        }

        .parameter-input input,
        .parameter-input textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            line-height: 1.4;
        }

        .parameter-input textarea {
            resize: vertical;
            min-height: 60px;
        }

        .parameter-input input:focus,
        .parameter-input textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .btn-approve {
            background: #28a745;
            color: white;
        }

        .btn-approve:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        .btn-reject {
            background: #dc3545;
            color: white;
        }

        .btn-reject:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }

        .btn-edit {
            background: #ffc107;
            color: #333;
        }

        .btn-edit:hover {
            background: #e0a800;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
        }

        .btn-save-edit {
            background: #17a2b8;
            color: white;
        }

        .btn-save-edit:hover {
            background: #138496;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(23, 162, 184, 0.3);
        }

        .btn-cancel-edit {
            background: #6c757d;
            color: white;
        }

        .btn-cancel-edit:hover {
            background: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 117, 125, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Input Area */
        .input-area {
            border-top: 1px solid #e0e0e0;
            padding: 16px 20px;
            background: white;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Status Messages */
        .status-message {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #666;
        }

        .loading {
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }

        .loading span {
            width: 4px;
            height: 4px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-6px);
            }
        }

        /* Error Messages */
        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        /* Edit Mode Indicator */
        .edit-mode-indicator {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Scrollbar styling */
        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🤖 Agent Chat</h1>
            <div class="thread-info" id="threadInfo">Thread ID: <span id="threadId">-</span></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="status-message">Start a conversation...</div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type your message here... (e.g., 'delete all record from customer table with name as john' or 'send a email to john@example.com saying hello')"
                    autocomplete="off"
                >
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        // ============= Configuration =============
        const API_BASE_URL = 'http://localhost:8000/api';
        let threadId = null;
        let currentEditingAction = null;

        // ============= Initialization =============
        document.addEventListener('DOMContentLoaded', function() {
            // Generate thread ID
            threadId = 'thread_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            document.getElementById('threadId').textContent = threadId;

            // Event listeners
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });

        // ============= Message Sending =============
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // Add user message to chat
            addMessageToChat('user', message);
            input.value = '';
            input.focus();

            // Disable send button while processing
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        thread_id: threadId,
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                handleApiResponse(data);

            } catch (error) {
                console.error('Error:', error);
                addErrorMessage(`Failed to send message: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // ============= API Response Handling =============
        function handleApiResponse(response) {
            if (response.type === 'interrupt') {
                handleInterrupt(response);
            } else if (response.type === 'completed') {
                addMessageToChat('assistant', response.message);
            } else if (response.type === 'error') {
                addErrorMessage(response.error);
            }
        }

        // ============= Interrupt Handling =============
        function handleInterrupt(response) {
            const chatArea = document.getElementById('chatArea');
            
            response.pending_actions.forEach(action => {
                const interruptPanel = createInterruptPanel(action);
                chatArea.appendChild(interruptPanel);
            });

            // Scroll to bottom
            scrollToBottom();
        }

        // ============= UI Creation =============
        function createInterruptPanel(action) {
            const panel = document.createElement('div');
            panel.className = 'interrupt-panel';
            panel.innerHTML = `
                <div class="interrupt-header">
                    <span class="interrupt-icon">⚠️</span>
                    <span>Action Pending Approval</span>
                </div>
            `;

            const actionCard = createActionCard(action);
            panel.appendChild(actionCard);

            return panel;
        }

        function createActionCard(action) {
            const card = document.createElement('div');
            card.className = 'action-card';
            card.id = `action-${action.action_id}`;

            const title = document.createElement('div');
            title.className = 'action-title';
            title.textContent = `Tool: ${formatToolName(action.tool_name)}`;
            card.appendChild(title);

            const description = document.createElement('div');
            description.className = 'action-description';
            description.textContent = action.description;
            card.appendChild(description);

            // Add parameters
            const parametersDiv = document.createElement('div');
            parametersDiv.className = 'parameters';
            parametersDiv.id = `params-${action.action_id}`;

            action.parameters.forEach(param => {
                const paramElement = createParameterElement(param, action.action_id);
                parametersDiv.appendChild(paramElement);
            });

            card.appendChild(parametersDiv);

            // Add action buttons
            const buttonsDiv = document.createElement('div');
            buttonsDiv.className = 'action-buttons';
            buttonsDiv.id = `buttons-${action.action_id}`;

            if (action.allowed_decisions.includes('approve')) {
                const approveBtn = createButton('Approve', 'btn-approve', () => {
                    approveAction(action.action_id);
                });
                buttonsDiv.appendChild(approveBtn);
            }

            if (action.allowed_decisions.includes('edit')) {
                const editBtn = createButton('Edit', 'btn-edit', () => {
                    enterEditMode(action);
                });
                buttonsDiv.appendChild(editBtn);
            }

            if (action.allowed_decisions.includes('reject')) {
                const rejectBtn = createButton('Reject', 'btn-reject', () => {
                    denyAction(action.action_id);
                });
                buttonsDiv.appendChild(rejectBtn);
            }

            card.appendChild(buttonsDiv);

            return card;
        }

        function createParameterElement(param, actionId) {
            const paramDiv = document.createElement('div');
            paramDiv.className = 'parameter';

            const label = document.createElement('div');
            label.className = 'parameter-label';
            label.textContent = param.name + ':';
            paramDiv.appendChild(label);

            const inputDiv = document.createElement('div');
            inputDiv.className = 'parameter-input';

            // Create input or textarea based on value length
            let input;
            if (typeof param.value === 'string' && param.value.length > 50) {
                input = document.createElement('textarea');
            } else {
                input = document.createElement('input');
                input.type = 'text';
            }

            input.value = param.value;
            input.dataset.paramName = param.name;
            input.dataset.actionId = actionId;
            input.disabled = true; // Disabled by default, enabled in edit mode
            input.className = 'param-input-field';

            inputDiv.appendChild(input);
            paramDiv.appendChild(inputDiv);

            return paramDiv;
        }

        function createButton(text, className, onClick) {
            const btn = document.createElement('button');
            btn.textContent = text;
            btn.className = `btn ${className}`;
            btn.addEventListener('click', onClick);
            return btn;
        }

        // ============= Action Handlers =============
        async function approveAction(actionId) {
            try {
                const response = await fetch(`${API_BASE_URL}/approve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        thread_id: threadId,
                        action_id: actionId,
                        decision: 'approve'
                    })
                });

                const data = await response.json();
                removeActionCard(actionId);
                handleApiResponse(data);

            } catch (error) {
                console.error('Error approving action:', error);
                addErrorMessage(`Failed to approve action: ${error.message}`);
            }
        }

        async function denyAction(actionId) {
            try {
                const response = await fetch(`${API_BASE_URL}/deny`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        thread_id: threadId,
                        action_id: actionId
                    })
                });

                const data = await response.json();
                removeActionCard(actionId);
                handleApiResponse(data);

            } catch (error) {
                console.error('Error denying action:', error);
                addErrorMessage(`Failed to deny action: ${error.message}`);
            }
        }

        function enterEditMode(action) {
            currentEditingAction = action;
            const actionCard = document.getElementById(`action-${action.action_id}`);

            // Show edit mode indicator
            const indicator = document.createElement('div');
            indicator.className = 'edit-mode-indicator';
            indicator.id = `edit-indicator-${action.action_id}`;
            indicator.textContent = '✏️ Edit Mode - Modify parameters and save changes';
            actionCard.insertBefore(indicator, actionCard.querySelector('.parameters'));

            // Enable all input fields
            actionCard.querySelectorAll('.param-input-field').forEach(input => {
                input.disabled = false;
            });

            // Replace buttons
            const buttonsDiv = actionCard.querySelector(`#buttons-${action.action_id}`);
            buttonsDiv.innerHTML = '';

            const saveBtn = createButton('Save & Approve', 'btn-save-edit', () => {
                saveEdit(action.action_id);
            });
            buttonsDiv.appendChild(saveBtn);

            const cancelBtn = createButton('Cancel', 'btn-cancel-edit', () => {
                exitEditMode(action.action_id);
            });
            buttonsDiv.appendChild(cancelBtn);
        }

        async function saveEdit(actionId) {
            try {
                const actionCard = document.getElementById(`action-${actionId}`);
                const editedParams = {};

                actionCard.querySelectorAll('.param-input-field').forEach(input => {
                    editedParams[input.dataset.paramName] = input.value;
                });

                // First, send edit request
                const editResponse = await fetch(`${API_BASE_URL}/edit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        thread_id: threadId,
                        action_id: actionId,
                        edited_parameters: editedParams
                    })
                });

                if (!editResponse.ok) {
                    throw new Error('Failed to save edits');
                }

                const editData = await editResponse.json();

                if (editData.type === 'interrupt') {
                    // Update the action card with new parameters
                    removeActionCard(actionId);
                    const interruptPanel = createInterruptPanel(editData.pending_actions[0]);
                    document.getElementById('chatArea').appendChild(interruptPanel);
                    scrollToBottom();
                    addMessageToChat('assistant', 'Parameters updated. Ready for approval.');
                }

            } catch (error) {
                console.error('Error saving edits:', error);
                addErrorMessage(`Failed to save edits: ${error.message}`);
            }
        }

        function exitEditMode(actionId) {
            const actionCard = document.getElementById(`action-${actionId}`);

            // Remove edit indicator
            const indicator = actionCard.querySelector(`#edit-indicator-${actionId}`);
            if (indicator) indicator.remove();

            // Disable all input fields
            actionCard.querySelectorAll('.param-input-field').forEach(input => {
                input.disabled = true;
            });

            // Restore original buttons
            const action = currentEditingAction;
            const buttonsDiv = actionCard.querySelector(`#buttons-${actionId}`);
            buttonsDiv.innerHTML = '';

            if (action.allowed_decisions.includes('approve')) {
                const approveBtn = createButton('Approve', 'btn-approve', () => {
                    approveAction(action.action_id);
                });
                buttonsDiv.appendChild(approveBtn);
            }

            if (action.allowed_decisions.includes('edit')) {
                const editBtn = createButton('Edit', 'btn-edit', () => {
                    enterEditMode(action);
                });
                buttonsDiv.appendChild(editBtn);
            }

            if (action.allowed_decisions.includes('reject')) {
                const rejectBtn = createButton('Reject', 'btn-reject', () => {
                    denyAction(action.action_id);
                });
                buttonsDiv.appendChild(rejectBtn);
            }

            currentEditingAction = null;
        }

        // ============= UI Utilities =============
        function addMessageToChat(role, content) {
            const chatArea = document.getElementById('chatArea');

            // Clear initial message if exists
            if (chatArea.innerHTML.includes('Start a conversation')) {
                chatArea.innerHTML = '';
            }

            const messageGroup = document.createElement('div');
            messageGroup.className = 'message-group';

            const message = document.createElement('div');
            message.className = `message ${role}`;

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.textContent = content;
            message.appendChild(messageContent);

            const messageTime = document.createElement('div');
            messageTime.className = 'message-time';
            messageTime.textContent = new Date().toLocaleTimeString();
            message.appendChild(messageTime);

            messageGroup.appendChild(message);
            chatArea.appendChild(messageGroup);

            scrollToBottom();
        }

        function addErrorMessage(error) {
            const chatArea = document.getElementById('chatArea');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = '❌ ' + error;
            chatArea.appendChild(errorDiv);
            scrollToBottom();
        }

        function removeActionCard(actionId) {
            const card = document.getElementById(`action-${actionId}`);
            if (card) {
                card.closest('.interrupt-panel').remove();
            }
        }

        function scrollToBottom() {
            const chatArea = document.getElementById('chatArea');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function formatToolName(toolName) {
            return toolName
                .replace(/_/g, ' ')
                .replace(/([A-Z])/g, ' $1')
                .replace(/\b\w/g, l => l.toUpperCase())
                .trim();
        }
    </script>
</body>
</html>
